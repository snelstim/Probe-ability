start_cook:
  name: Start cook
  description: Start a new cook session.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID (optional if only one instance).
      required: false
      selector:
        text:
    target_temp:
      name: Target temperature
      description: Target internal temperature in °C.
      required: false
      default: 74.0
      selector:
        number:
          min: 30
          max: 200
          step: 0.5
          unit_of_measurement: "°C"
    probe_mode:
      name: Probe mode
      description: "combined = all probes share one cook, individual = each probe is independent."
      required: false
      default: "combined"
      selector:
        select:
          options:
            - combined
            - individual
    probe_index:
      name: Probe index
      description: "Which probe to start (0, 1, or 2). Only used in individual mode."
      required: false
      selector:
        number:
          min: 0
          max: 2
          step: 1

stop_cook:
  name: Stop cook
  description: Stop a cook and clear readings.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID (optional if only one instance).
      required: false
      selector:
        text:
    probe_index:
      name: Probe index
      description: "Which probe to stop (0, 1, or 2). Omit to stop all probes."
      required: false
      selector:
        number:
          min: 0
          max: 2
          step: 1

set_target:
  name: Set target temperature
  description: Update the target temperature for an active cook.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID (optional if only one instance).
      required: false
      selector:
        text:
    target_temp:
      name: Target temperature
      description: New target internal temperature in °C.
      required: true
      selector:
        number:
          min: 30
          max: 200
          step: 0.5
          unit_of_measurement: "°C"
    probe_index:
      name: Probe index
      description: "Which probe to update (0, 1, or 2). Omit to update all probes."
      required: false
      selector:
        number:
          min: 0
          max: 2
          step: 1
